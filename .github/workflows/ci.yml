name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: 🧪 PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }} ${{ matrix.flags }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Plancher : prouve que "php": ">=8.2" et symfony ^6.4 (LTS) sont tenus
          - php: '8.2'
            symfony: '6.4.*'
            flags: '--prefer-lowest'
          - php: '8.3'
            symfony: '7.*'
          - php: '8.4'
            symfony: '7.*'
          # Plafond : Symfony 8 exige PHP >= 8.4, donc pas de ligne 8.2/8.3 ici
          - php: '8.4'
            symfony: '8.*'

    env:
      SYMFONY_DEPRECATIONS_HELPER: max[direct]=0

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # gd sert uniquement à la validation croisée des tests (getimagesizefromstring),
          # jamais à l'extraction — cf. CLAUDE.md
          extensions: mbstring, gd
          coverage: xdebug

      - name: 📦 Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: ♻️ Cache Composer packages
        uses: actions/cache@v5
        with:
          # On cache le cache Composer, jamais vendor/ (convention Symfony)
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ matrix.symfony }}-${{ matrix.flags }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-${{ matrix.symfony }}-

      - name: 🔒 Pin Symfony version
        run: composer require --no-update --dev symfony/framework-bundle:${{ matrix.symfony }} symfony/http-kernel:${{ matrix.symfony }}

      - name: 📦 Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress ${{ matrix.flags }}

      - name: ✅ Validate composer.json
        run: composer validate --strict

      - name: 🔍 Audit des dépendances
        run: composer audit

      - name: 🧪 Run PHPUnit
        run: vendor/bin/phpunit --colors=always

  # Les règles de CONTRIBUTING.md ne valent que si une machine les vérifie.
  conventions:
    name: 📏 Conventions
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🚧 No Symfony outside the bridge
        run: |
          # La librairie doit rester utilisable hors Symfony : c'est la raison
          # d'être d'un type: library plutôt qu'un symfony-bundle.
          found=$(grep -rl 'Symfony\\' src/ --include='*.php' | grep -v '^src/Bridge/' || true)
          if [ -n "$found" ]; then
            echo "::error::Symfony importé hors de src/Bridge/ :"; echo "$found"; exit 1
          fi
          echo "✅ Symfony confiné à src/Bridge/"

      - name: 🚧 No GD in src/
        run: |
          # GD sert à fabriquer et valider dans les tests, jamais à extraire :
          # le package ne doit dépendre d'aucune extension.
          found=$(grep -rlE 'imagecreate|imagejpeg|getimagesize|imagedestroy' src/ --include='*.php' || true)
          if [ -n "$found" ]; then
            echo "::error::GD utilisé dans src/ :"; echo "$found"; exit 1
          fi
          echo "✅ aucun appel GD dans src/"

      - name: 🚧 declare(strict_types=1) everywhere
        run: |
          found=$(find src -name '*.php' ! -exec grep -lq 'declare(strict_types=1);' {} \; -print)
          if [ -n "$found" ]; then
            echo "::error::declare(strict_types=1) manquant :"; echo "$found"; exit 1
          fi
          echo "✅ strict_types dans tous les fichiers de src/"

      - name: 🚧 No CPU-dependent unpack
        run: |
          # S et L suivent l'endianness de la machine : le parsing deviendrait
          # dépendant du CPU. Seuls v/V (little) et n/N/J (big) sont admis.
          found=$(grep -rnE "unpack\('[SL]" src/ --include='*.php' || true)
          if [ -n "$found" ]; then
            echo "::error::unpack() dépendant du CPU :"; echo "$found"; exit 1
          fi
          echo "✅ endianness explicite partout"

      - name: 🚧 Public API documented in English
        run: |
          # Le package est public : son PHPDoc est sa documentation d'API.
          found=$(grep -rlP '^\s*\*.*\b(le|la|les|une|des|du|qui|que|dans|pour|avec|sur|est|sont|cette|ce)\b' \
                  src/ --include='*.php' || true)
          if [ -n "$found" ]; then
            echo "::error::commentaires en français dans src/ :"; echo "$found"; exit 1
          fi
          echo "✅ commentaires en anglais"

      - name: 🚧 No RAW committed
        run: |
          # Un RAW porte des EXIF (numéro de série, GPS) et resterait dans
          # l'historique git à vie.
          found=$(git ls-files | grep -iE '\.(cr2|cr3|nef|arw|dng|raf|orf|rw2)$' || true)
          if [ -n "$found" ]; then
            echo "::error::fichier RAW commité :"; echo "$found"; exit 1
          fi
          echo "✅ aucun RAW dans le repo"

  coverage:
    name: 📊 Couverture (≥ 95 %)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, gd
          coverage: xdebug

      - name: 📦 Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: 📊 Check coverage threshold
        env:
          XDEBUG_MODE: coverage
        run: |
          vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
          # PHPUnit affiche la couverture mais n'échoue jamais sur un seuil.
          php bin/coverage-check.php coverage.xml 95
